name: Actualizar Supabase

on:
  schedule:
    - cron: '0 * * * *'  # cada hora
  workflow_dispatch:  # permite ejecutarlo manualmente

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar JSON de OneDrive
        run: |
          curl -L "https://adslhouse-my.sharepoint.com/:u:/p/efarfan/IQCusPJ4g4fFT7AzRybfEWxjAZHeeW0cU6-ZcYxhQUh-T4k?e=Pruk5G&download=1" -o datos.json
          cat datos.json

      - name: Vaciar tabla en Supabase
        run: |
          curl -X DELETE "https://edcnjdupwvjxutlaemdy.supabase.co/rest/v1/registros?id=gte.0" \
            -H "apikey: edcnjdupwvjxutlaemdy" \
            -H "Authorization: Bearer edcnjdupwvjxutlaemdy" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal"

      - name: Insertar datos en Supabase
        run: |
          curl -X POST "https://edcnjdupwvjxutlaemdy.supabase.co/rest/v1/registros" \
            -H "apikey: edcnjdupwvjxutlaemdy" \
            -H "Authorization: Bearer edcnjdupwvjxutlaemdy" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d @datos.json
